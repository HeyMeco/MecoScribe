<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcribing — MecoScribe</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1117;
      --panel: #171a22;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #6ea8fe;
      --border: #2a2f3a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --border: #e5e7eb;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
    }
    .file {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
      word-break: break-all;
    }
    .progress-bar {
      height: 8px;
      background: var(--bg);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .step {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detail {
      color: var(--muted);
      font-size: 0.88rem;
      min-height: 2.6em;
      margin-bottom: 20px;
    }
    .note {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
      margin-bottom: 20px;
    }
    .error {
      color: #ef4444;
      font-size: 0.88rem;
      margin-bottom: 16px;
      min-height: 1.2em;
    }
    button {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Transcribing</h1>
    <div class="file" id="fileName"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step" id="stepLabel">Preparing…</div>
    <div class="detail" id="stepDetail">Checking audio file and model cache</div>
    <p class="note">Models download from Hugging Face on first run. This can take several minutes.</p>
    <div class="error" id="error"></div>
    <button id="dismissBtn" hidden>Dismiss</button>
  </div>

  <script>
    const fileName = document.getElementById("fileName");
    const progressFill = document.getElementById("progressFill");
    const stepLabel = document.getElementById("stepLabel");
    const stepDetail = document.getElementById("stepDetail");
    const errorEl = document.getElementById("error");
    const dismissBtn = document.getElementById("dismissBtn");
    let activeAudioPath = null;

    dismissBtn.addEventListener("click", () => window.close());

    const params = new URLSearchParams(window.location.search);
    const audioPath = params.get("audioPath");
    if (audioPath) {
      activeAudioPath = audioPath;
      fileName.textContent = audioPath.split("/").pop();
      errorEl.textContent = "";
      dismissBtn.hidden = true;
      window.mecoscribeApp.startTranscription(audioPath).catch((error) => {
        errorEl.textContent = error.message;
        dismissBtn.hidden = false;
      });
    }

    window.mecoscribeApp.onTranscriptionProgress((payload) => {
      const fraction = Math.round((payload.fraction || 0) * 100);
      progressFill.style.width = `${fraction}%`;
      stepLabel.textContent = payload.step || "Working…";
      stepDetail.textContent = payload.detail || "";
    });

    window.mecoscribeApp.onTranscriptionComplete(() => {
      dismissBtn.hidden = true;
      stepLabel.textContent = "Opening editor…";
      stepDetail.textContent = "Loading transcript";
    });

    window.mecoscribeApp.onTranscriptionError(({ message }) => {
      errorEl.textContent = message;
      dismissBtn.hidden = false;
    });
  </script>
</body>
</html>
